openapi: 3.0.3
info:
  title: onecx-demo-svc API
  version: 1.0.0
servers:
 -
  url: /api
paths:
  /internal/products:
    post:
      tags:
       - productsInternal
      description: Create Product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
      security:
       - oauth2: [ ocx-demo:all, ocx-demo:write ]
  /internal/products/{id}:
    get:
      tags:
       - productsInternal
      description: Get Product by ID
      operationId: getProductById
      parameters:
       -
        required: true
        in: path
        name: id
        schema:
          type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
      security:
       - oauth2: [ ocx-demo:all, ocx-demo:read ]
    put:
      tags:
       - productsInternal
      description: Update Product
      operationId: updateProduct
      parameters:
       -
        required: true
        in: path
        name: id
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
      security:
       - oauth2: [ ocx-demo:all, ocx-demo:write ]
    delete:
      tags:
       - productsInternal
      description: Delete Product
      operationId: deleteProduct
      parameters:
       -
        required: true
        in: path
        name: id
        schema:
          type: string
      responses:
        '204':
          description: Product deleted
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
      security:
       - oauth2: [ ocx-demo:all, ocx-demo:delete ]
  /internal/products/search:
    post:
      tags:
       - productsInternal
      description: Search products
      operationId: searchProducts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSearchCriteria'
      responses:
        '200':
          description: Search result for products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResult'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
      security:
       - oauth2: [ ocx-demo:all, ocx-demo:read ]
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://oauth.simple.api/token
          scopes:
            ocx-demo:all: Grants access to all operations
            ocx-demo:read: Grants read access
            ocx-demo:write: Grants write access
            ocx-demo:delete: Grants access to delete operations
  schemas:
    ProblemDetailParam:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    ProblemDetailInvalidParam:
      type: object
      properties:
        name:
          type: string
        message:
          type: string
    ProblemDetailResponse:
      type: object
      properties:
        errorCode:
          type: string
        detail:
          type: string
        params:
          type: array
          items:
            $ref: '#/components/schemas/ProblemDetailParam'
        invalidParams:
          type: array
          items:
            $ref: '#/components/schemas/ProblemDetailInvalidParam'
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    CategorySearchCriteria:
      type: object
      properties:
        pageNumber:
          format: int32
          description: The number of page.
          type: integer
          default: 0
        pageSize:
          maximum: 1000
          description: The size of page
          default: 100
          format: int32
          type: integer
        name:
          type: string
    CategoryPageResult:
      type: object
      properties:
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int32
          type: integer
        number:
          format: int32
          type: integer
        size:
          format: int32
          type: integer
        stream:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          format: double
          type: number
        category:
          $ref: '#/components/schemas/Category'
    ProductSearchCriteria:
      type: object
      properties:
        pageNumber:
          format: int32
          description: The number of page.
          type: integer
          default: 0
        pageSize:
          maximum: 1000
          description: The size of page
          default: 100
          format: int32
          type: integer
        name:
          type: string
        price:
          format: double
          type: number
    ProductPageResult:
      type: object
      properties:
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int32
          type: integer
        number:
          format: int32
          type: integer
        size:
          format: int32
          type: integer
        stream:
          type: array
          items:
            $ref: '#/components/schemas/Product'
